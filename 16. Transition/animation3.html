<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    div {
      width: 100px;
      height: 100px;
      background-color: blueviolet;
      position: relative;
     animation-name: myAnimation;
     animation-duration: 4s;
    }
    @keyframes myAnimation {
      0% {background-color: blueviolet; left: 0px; top: 0px;}
      25% {background-color: red; left: 200px; top: 0px;}
      50% {background-color: green; left: 200px; top: 200px;}
      75% {background-color: yellow; left: 0px; top: 200px;}
      100% {background-color: palevioletred; left: 0px; top: 0px;}
    }
  </style>
</head>
<body>
  <h1>CSS Animation</h1>
  <div></div>
  <p><b>Catatan:</b>Setelah animasi selesai, animasi tersebut kembali bentuk semula.</p>
</body>
</html>
