<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    div {
      padding: 5px;
      text-align: center;
      border: 5px solid rgb(207, 90, 90);
      width: 100px;
      height: 20px;
      background-color: red;
     transition-property: all;
     transition-duration: 0.4s;

    }

    div:hover {
      background-color: blue;
      width: 200px;
      height: 200px;
      border: 10px double rgb(207, 90, 90);
    }
  </style>
</head>
<body>
  <div>Hover Here!</div>
</body>
</html>
