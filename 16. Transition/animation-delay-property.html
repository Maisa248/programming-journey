<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    div {
      width: 100px;
      height: 100px;
      background-color: blueviolet;
      position: relative;
     animation-name: myAnimation;
     animation-duration: 4s;
      animation-iteration-count: 3;
    }
    @keyframes myAnimation {
      0% {background-color: blueviolet; left: 0px; top: 0px;}
      25% {background-color: red; left: 200px; top: 0px;}
      50% {background-color: green; left: 200px; top: 200px;}
      75% {background-color: yellow; left: 0px; top: 200px;}
      100% {background-color: palevioletred; left: 0px; top: 0px;}
    }
  </style>
</head>
<body>
  <h1>CSS Animation-delay-Property</h1>
  <div></div>
  <p>Properti animation-iteration-count menentukan berapa
    kali animasi harus dijalankan. Contoh berikut menjalankan animasi sebanyak 3 kali
      sebelum berhenti:
  </p>
</body>
</html>
