<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> tygas width dan height1</title>
    <style>
        .container {
            width: 200px;
            height: 100px;
            background-color: lightblue;
            border: 2px solid palevioletred;
        }
        .box1 {
            width: 300px;
            height: 150px;
            background-color: lightgoldenrodyellow;
            border: 2px solid palevioletred;
        }
        .box2 {
            width: 400px;
            height: 200px;
            background-color: lightgrey;
            border: 2px solid palevioletred;
        }
        
    </style>
</head>
<body>
    <h2>Tugas 7 - Width Height1</h2>
    <div class="container">Kotak 1 : 200px x 100px</div>
    <div class="box1">Kotak 2 : 300px x 150px</div>
    <div class="box2">Kotak 3 : 400px x 200px</div>
</body>
</html>
