<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* Default: Mobile (HP) */
    body {
      font-family: Arial, sans-serif;
      background-color: lightblue;
      text-align: center;
    }

    .cpntainer {
      padding: 20px;
    }
    /*Tablet (lebar layar minimal 768px) */
    @media (min-width: 768px) {
      body {
        background-color: lightgreen;
      }
      .container {
        width: 80px;
        margin: auto;
      }
    }

    /*Laptop/Desktop (lebar layar minimal 1024px) */
    @media (min-width: 1024px) {
      body {
        background-color: lightcoral;
      }
      .container {
        width: 60px;
        margin: auto;
      }
    }
  </style>
</head>
<body>
  <div class="containner">
    <h1>Responsive Design</h1>
    <p>Contoh tampilan menggunakan ,edia query</p>
  </div>
</body>
</html>
